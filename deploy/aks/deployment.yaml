apiVersion: apps/v1
kind: Deployment
metadata:
  name: speech-studio
  labels:
    app: speech-studio
spec:
  replicas: 2
  revisionHistoryLimit: 5
  selector:
    matchLabels:
      app: speech-studio
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app: speech-studio
    spec:
      # Graceful shutdown: wait for in-flight WebSocket sessions to drain.
      terminationGracePeriodSeconds: 60
      containers:
        - name: speech-studio
          image: REGISTRY/speech-studio:TAG  # replace in CI: ACR login + `kubectl set image`
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5001
              name: http
          envFrom:
            - secretRef:
                name: speech-studio-secrets
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 20
            periodSeconds: 30
            timeoutSeconds: 3
            failureThreshold: 3
          # Let in-flight WebSocket sessions finish before the process exits.
          lifecycle:
            preStop:
              exec:
                command: ["sh", "-c", "sleep 30"]
      # Schedule across zones/nodes for resilience.
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app: speech-studio
