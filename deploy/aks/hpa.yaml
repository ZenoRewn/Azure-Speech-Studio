apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: speech-studio
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: speech-studio
  minReplicas: 2
  maxReplicas: 8
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 75
  behavior:
    # Scale up quickly for bursts of new Voice Live sessions.
    scaleUp:
      stabilizationWindowSeconds: 30
      policies:
        - type: Pods
          value: 2
          periodSeconds: 30
    # Scale down slowly to avoid kicking users mid-conversation.
    scaleDown:
      stabilizationWindowSeconds: 600
      policies:
        - type: Pods
          value: 1
          periodSeconds: 180
