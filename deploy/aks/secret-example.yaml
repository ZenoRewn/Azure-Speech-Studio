# Example Secret for local / test deployments.
#
# PRODUCTION WARNING: Do NOT commit real keys. In production, prefer one of:
#   1. Azure Key Vault + Workload Identity + CSI driver (SecretProviderClass)
#   2. External Secrets Operator pointing at Key Vault
#   3. `kubectl create secret generic speech-studio-secrets --from-literal=...`
#      piped from az keyvault secret show during deployment
#
# The keys below must match the env vars read by app.py / speech/*.py.
apiVersion: v1
kind: Secret
metadata:
  name: speech-studio-secrets
type: Opaque
stringData:
  ASIA_SPEECH_KEY: ""
  ASIA_SPEECH_REGION: "eastus"
  AZURE_OPENAI_API_KEY: ""
  AZURE_OPENAI_ENDPOINT: ""
  AZURE_OPENAI_DEPLOYMENT: "gpt-4o-mini"
  AZURE_OPENAI_VERSION: "2025-04-01-preview"
  AZURE_VOICELIVE_ENDPOINT: ""
  AZURE_STORAGE_ACCOUNT: ""
  AZURE_STORAGE_KEY: ""
  AZURE_STORAGE_CONTAINER: "speech-studio"
  OPENAI_API_KEY: ""
  LOG_LEVEL: "INFO"
---
