services:
  speech-studio:
    build: .
    image: speech-studio:dev
    ports:
      - "5001:5001"
    env_file:
      - .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:5001/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
